<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATi | 认知架构类型指标测试</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-card: rgba(20, 20, 30, 0.8);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-muted: rgba(255, 255, 255, 0.4);
            --accent-cyan: #00d4ff;
            --accent-purple: #8b5cf6;
            --accent-pink: #f472b6;
            --border-subtle: rgba(255, 255, 255, 0.1);
            --border-glow: rgba(0, 212, 255, 0.3);
            --shadow-glow: 0 0 40px rgba(0, 212, 255, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100dvh;
            overflow-x: hidden;
            line-height: 1.6;
        }
        .bg-effects { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .bg-gradient {
            position: absolute; width: 150%; height: 150%; top: -25%; left: -25%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(139,92,246,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(244,114,182,0.05) 0%, transparent 60%);
            animation: bgPulse 20s ease-in-out infinite;
        }
        @keyframes bgPulse {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.1) rotate(5deg); opacity: 0.8; }
        }
        .scanlines {
            position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,0.03) 2px, rgba(0,212,255,0.03) 4px);
            animation: scanlineMove 8s linear infinite;
        }
        @keyframes scanlineMove { 0% { transform: translateY(0); } 100% { transform: translateY(4px); } }
        .noise {
            position: absolute; inset: 0; opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }
        .back-home-btn {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            border-radius: 100px; padding: 8px 16px; font-size: 12px; font-weight: 500;
            color: var(--text-secondary); backdrop-filter: blur(10px);
            cursor: pointer; transition: all 0.3s ease;
            display: flex; align-items: center; gap: 6px;
        }
        .back-home-btn:hover { border-color: var(--border-glow); background: rgba(0,212,255,0.05); }
        .visitor-counter {
            position: relative; display: flex; align-items: center; gap: 8px;
            justify-content: flex-end; padding: 8px 16px; font-size: 12px; color: var(--text-muted);
            margin-top: 20px;
        }
        .visitor-count { color: var(--accent-cyan); font-weight: 600; }
        .app { position: relative; z-index: 1; min-height: 100dvh; display: flex; flex-direction: column; }
        .page {
            display: none; flex: 1; flex-direction: column; justify-content: center;
            align-items: center; padding: 40px 24px; animation: fadeIn 0.6s ease-out;
        }
        .page.active { display: flex; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hero-section { text-align: center; max-width: 900px; width: 100%; }
        .cover-image-container {
            position: relative; width: 100%; max-width: 600px; margin: 0 auto 24px;
            border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-glow);
        }
        .cover-image { width: 100%; height: auto; display: block; }
        .intro-section {
            background: var(--bg-card); border:1px solid var(--border-subtle);
            border-radius: 16px; padding: 20px 28px; margin-bottom: 20px; text-align: left;
            backdrop-filter: blur(10px);
        }
        .intro-text { font-size: 13px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 14px; }
        .intro-text strong { color: var(--accent-cyan); font-weight: 600; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 16px 32px; font-size: 16px; font-weight: 600; font-family: inherit;
            border: none; border-radius: 100px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16,1,0.3,1); position: relative; overflow: hidden;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: var(--bg-primary); box-shadow: 0 4px 20px rgba(0,212,255,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,212,255,0.4); }
        .btn-primary:active { transform: translateY(0) scale(0.98); }
        .btn-option {
            width: 100%; padding: 20px 24px; background: var(--bg-card);
            border: 1px solid var(--border-subtle); color: var(--text-primary);
            text-align: left; justify-content: flex-start; border-radius: 16px;
            font-weight: 400; line-height: 1.6;
        }
        .btn-option:hover { border-color: var(--border-glow); background: rgba(0,212,255,0.05); transform: translateX(4px); }
        .btn-option .option-label {
            display: inline-flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; background: var(--border-subtle); border-radius: 8px;
            font-weight: 600; font-size: 14px; margin-right: 16px; flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .btn-option:hover .option-label { background: var(--accent-cyan); color: var(--bg-primary); }
        .quiz-container { width: 100%; max-width: 680px; }
        .quiz-header { margin-bottom: 40px; }
        .progress-bar { height: 4px; background: var(--border-subtle); border-radius: 2px; overflow: hidden; margin-bottom: 24px; }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            border-radius: 2px; transition: width 0.5s cubic-bezier(0.16,1,0.3,1);
            box-shadow: 0 0 10px rgba(0,212,255,0.5);
        }
        .progress-text { font-size: 14px; color: var(--text-muted); font-weight: 500; }
        .progress-text span { color: var(--accent-cyan); font-weight: 600; }
        .question-title { font-size: 14px; color: var(--accent-cyan); letter-spacing: 2px; margin-bottom: 12px; }
        .question-text { font-size: 22px; font-weight: 500; line-height: 1.5; margin-bottom: 32px; white-space: pre-line; }
        .options-container { display: flex; flex-direction: column; gap: 16px; }
        .result-container { width: 100%; max-width: 1200px; display: flex; gap: 40px; align-items: flex-start; }
        .result-left { flex: 0 0 400px; display: flex; flex-direction: column; align-items: center; }
        .result-image-container {
            position: relative; width: 100%; max-width: 400px;
            border-radius: 24px; overflow: hidden; box-shadow: var(--shadow-glow);
        }
        .result-image-container::before {
            content: ''; position: absolute; inset: 0; border: 1px solid var(--border-glow);
            border-radius: 24px; z-index: 1; pointer-events: none;
        }
        .result-image { width: 100%; height: auto; display: block; }
        .result-code {
            font-size: 18px; font-weight: 500; letter-spacing: 2px;
            color: var(--text-muted);
            margin-top: 16px;
        }
        .result-name-wrapper { display: flex; align-items: baseline; gap: 8px; margin-bottom: 20px; }
        .result-code-small {
            font-size: 12px; color: var(--text-muted); letter-spacing: 2px;
        }
        .result-name-row { display: flex; align-items: flex-end; gap: 12px; line-height: 1; }
        .result-name { font-size: 36px; font-weight: 700; color: var(--text-primary); line-height: 1;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .result-code-mini { font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.3); letter-spacing: 1px; line-height: 1; }
        .result-right { flex: 1; min-width: 0; }
        .result-desc {
            font-size: 16px; color: var(--text-secondary); line-height: 1.8; text-align: left;
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            border-radius: 16px; padding: 24px; margin-top: 32px; margin-bottom: 24px;
        }
        .result-question {
            font-size: 16px; color: var(--accent-pink); font-style: italic;
            margin-bottom: 24px; padding: 20px; border-left: 3px solid var(--accent-pink);
            background: rgba(244,114,182,0.05); text-align: left;
        }
        .result-actions { display: flex; gap: 16px; flex-wrap: wrap; }
        .btn-secondary { background: transparent; border: 1px solid var(--border-subtle); color: var(--text-primary); }
        .btn-secondary:hover { border-color: var(--border-glow); background: rgba(255,255,255,0.05); }
        .gallery-page { padding: 60px 24px; }
        .gallery-header { text-align: center; margin-bottom: 48px; }
        .gallery-title { font-size: 32px; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .gallery-subtitle { font-size: 14px; color: var(--text-muted); }
        .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; max-width: 1400px; margin: 0 auto; }
        .gallery-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px; overflow: hidden; transition: all 0.3s ease; cursor: pointer; }
        .gallery-card:hover { border-color: var(--border-glow); transform: translateY(-4px); box-shadow: var(--shadow-glow); }
        .gallery-card-image { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .gallery-card-info { padding: 16px; }
        .gallery-card-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .gallery-card-code { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
        .gallery-card-brief { font-size: 12px; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .gallery-modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); overflow-y: hidden; }
        .gallery-modal.active { display: flex; justify-content: center; align-items: center; padding: 40px 24px; overflow-y: auto; }
        .body-no-scroll { overflow: hidden; }
        .gallery-modal-content { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 24px; max-width: 900px; width: 100%; display: flex; gap: 32px; margin: auto; position: relative; }
        .gallery-modal-left { flex: 0 0 350px; padding: 24px; }
        .gallery-modal-image { width: 100%; border-radius: 16px; }
        .gallery-modal-right { flex: 1; padding: 24px 24px 24px 0; }
        .gallery-modal-close { position: absolute; top: 16px; right: 16px; width: 40px; height: 40px; background: var(--border-subtle); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-primary); font-size: 20px; transition: all 0.3s ease; }
        .gallery-modal-close:hover { background: var(--accent-cyan); color: var(--bg-primary); }
        .loading-container {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            gap: 24px; min-height: 100dvh;
        }
        .loading-container.active { display: flex; }
        .loading-spinner {
            width: 60px; height: 60px; border: 2px solid var(--border-subtle);
            border-top-color: var(--accent-cyan); border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 14px; color: var(--text-muted); letter-spacing: 2px; }
        .toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: var(--bg-card); border: 1px solid var(--border-glow);
            color: var(--accent-cyan); padding: 12px 24px; border-radius: 100px;
            font-size: 14px; backdrop-filter: blur(10px); z-index: 200;
            opacity: 0; transition: all 0.4s cubic-bezier(0.16,1,0.3,1); pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        @media (max-width: 640px) {
            .question-text { font-size: 18px; }
            .result-code { font-size: 36px; }
            .result-name { font-size: 20px; }
            .btn { padding: 14px 24px; font-size: 15px; }
            .visitor-counter { top: 12px; right: 12px; padding: 6px 12px; font-size: 11px; }
            .intro-section { padding: 16px; }
            .result-container { flex-direction: column; align-items: center; }
            .result-left { flex: none; width: 100%; max-width: 300px; }
            .result-right { width: 100%; }
            .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
            .gallery-modal-content { flex-direction: column; }
            .gallery-modal-left { padding: 16px; flex: none; }
            .gallery-modal-right { padding: 16px; }
        }
        @media (max-width: 900px) {
            .result-container { flex-direction: column; align-items: center; }
            .result-left { flex: none; }
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="bg-effects">
        <div class="bg-gradient"></div>
        <div class="scanlines"></div>
        <div class="noise"></div>
    </div>
    <div class="back-home-btn" id="backHomeBtn" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9M5 21h14"/></svg>
        返回首页
    </div>
    <div class="app">
        <div class="page active" id="homePage">
            <button class="btn btn-secondary" id="homeGalleryBtn" style="position: fixed; top: 20px; right: 20px; padding: 10px 20px; font-size: 14px;">
                查看图鉴
            </button>
            <div class="hero-section">
                <div class="cover-image-container">
                    <img class="cover-image" src="0. logo.webp" alt="CATi Cover">
                </div>
                <div class="intro-section">
                    <p><span class="intro-highlight">CATi (Cognitive Architecture Type Indicator)</span> 是一套基于认知神经科学与计算心理学逻辑的心智性能压测系统。与传统的 MBTI 性格测试不同，CATi 不关注你的"性格倾向"，而是探测你大脑这台"生物计算机"的<span class="intro-highlight">底层硬件配置</span>、<span class="intro-highlight">算力分配模式</span>以及<span class="intro-highlight">系统防火墙强度</span>。</p>
                </div>
                <button class="btn btn-primary" id="startBtn">
                    开始测试
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </div>
        </div>
        <div class="page" id="quizPage">
            <div class="quiz-container">
                <div class="quiz-header">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 25%"></div>
                    </div>
                    <div class="progress-text">问题 <span id="currentQuestion">1</span> / 4</div>
                </div>
                <div class="question-title" id="questionTitle">认知底层压力实验</div>
                <h2 class="question-text" id="questionText"></h2>
                <div class="options-container" id="optionsContainer"></div>
            </div>
        </div>
        <div class="loading-container" id="loadingPage">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在分析认知架构</div>
        </div>
        <div class="page" id="resultPage">
            <div class="result-container">
                <div class="result-left">
                    <div class="result-image-container">
                        <img class="result-image" id="resultImage" src="" alt="">
                    </div>
                </div>
                <div class="result-right">
                    <div class="result-name-row">
                        <h1 class="result-name" id="resultName"></h1>
                        <span class="result-code-mini" id="resultCodeMini"></span>
                    </div>
                    <div class="result-desc" id="resultDesc"></div>
                    <div class="result-question" id="resultQuestion"></div>
                    <div class="result-actions">
                        <button class="btn btn-primary" id="restartBtn">重新测试</button>
                        <button class="btn btn-secondary" id="galleryBtn">查看图鉴</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="page" id="galleryPage">
            <div class="gallery-page">
                <div class="gallery-header">
                    <h1 class="gallery-title">CATi 认知架构图鉴</h1>
                    <p class="gallery-subtitle">16种脑内职人架构全览</p>
                </div>
                <div class="gallery-grid" id="galleryGrid"></div>
            </div>
        </div>
        <div class="gallery-modal" id="galleryModal">
            <div class="gallery-modal-content">
                <button class="gallery-modal-close" id="modalClose">×</button>
                <div class="gallery-modal-left">
                    <img class="gallery-modal-image" id="modalImage" src="" alt="">
                </div>
                <div class="gallery-modal-right">
                    <h1 class="result-name" id="modalName" style="margin-bottom:8px;"></h1>
                    <div class="result-code-small" id="modalCode"></div>
                    <div class="result-desc" id="modalDesc"></div>
                    <div class="result-question" id="modalQuestion" style="margin-top:16px;"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
    (function() {
        // 用 \u201c \u201d 替代中文引号，避免破坏JS字符串
        var LQ = '"';
        var RQ = '"';

        var questions = [
            {
                title: '一心二用',
                text: '快速大声念诵' + LQ + '西瓜、葡萄、哈密瓜' + RQ + '，同时在脑中推演：从你家门口闭眼走到最近的电梯口，需要走几步？中途是否有障碍物？',
                options: [
                    { label: 'A', text: '念词与脑内推演互不干扰，像有两个独立通道在同时运行。' },
                    { label: 'B', text: '一想路嘴就慢，或者一念词脑子就卡顿，感到明显的资源竞争。' }
                ]
            },
            {
                title: '画师滤镜',
                text: '闭眼想象一个正在运转的透明机械齿轮组。尝试观察齿轮咬合处的金属磨损痕迹，并想象摩擦产生的细微火花和金属声。',
                options: [
                    { label: 'A', text: '画面极清晰，能实时模拟物理细节、质感甚至光泽，像看 4K 电影。' },
                    { label: 'B', text: '只有模糊影子或' + LQ + '齿轮在转' + RQ + '的概念。你处理的是属性而非像素，细节全靠文字描述补齐。' }
                ]
            },
            {
                title: '脑内旁白',
                text: '快速判定下题对错，禁止在脑中默读题目：' + LQ + '若所有 A 都在 B 内，所有 B 都在 C 内，则 A 一定在 C 内。' + RQ,
                options: [
                    { label: 'A', text: '瞬间产生空间嵌套或流向的直觉，结论直接跳过语言层弹出。' },
                    { label: 'B', text: '必须在脑子里读一遍，或转化成具体例子（如苹果在篮里）才能确认。' }
                ]
            },
            {
                title: '冷酷执行',
                text: '快速回想一个你最近感到极度尴尬、羞耻或被冒犯的瞬间吧。在羞耻感充满全身的瞬间，立即口算：17 + 28 = ?',
                options: [
                    { label: 'A', text: '计算完全不受情绪干扰，数字像从另一个独立的冷酷窗口中弹出。' },
                    { label: 'B', text: '脑子当场变慢或死机，情绪像浓雾遮住了计算电路，无法集中精力。' }
                ]
            }
        ];

        var results = {
            'AAAA': {
                name: '全能指挥官',
                image: '1. AAAA 【全能指挥官】.webp',
                brief: '这是认知层面的顶级性能架构。你不仅拥有多线程并行的超高带宽，还具备 4K 级的全息渲染能力。最核心的特征是你的逻辑跳过了语言翻译，直接以直觉形式运行，并受坚不可摧的冷酷防火墙保护。',
                detail: '极高维度的全局掌控力，在混乱、高压、多线并发的危机中，你是唯一能维持满负荷输出的个体。但存在认知孤岛效应，因为你的思维太快且无声，你极度缺乏耐心去向他人解释那些在你看来理所应当的逻辑。可以主动降频，学习如何将你的' + LQ + '直觉快感' + RQ + '翻译成他人能理解的文字。',
                question: '你是否觉得世界在你面前是一串串流动的代码，而你只需要伸手拨动它们？'
            },
            'AAAB': {

        var currentQuestionIndex = 0;
        var answers = [];

        function $(id) { return document.getElementById(id); }

        function showToast(msg) {
            var t = $('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 2000);
        }

        function showPage(pageId) {
            var pages = document.querySelectorAll('.page');
            for (var i = 0; i < pages.length; i++) {
                pages[i].classList.remove('active');
            }
            $(pageId).classList.add('active');
            $('backHomeBtn').style.display = pageId === 'homePage' ? 'none' : 'flex';
        }

        function startQuiz() {
            currentQuestionIndex = 0;
            answers = [];
            renderQuestion();
            showPage('quizPage');
        }

        function renderQuestion() {
            var question = questions[currentQuestionIndex];
            var progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            $('progressFill').style.width = progress + '%';
            $('currentQuestion').textContent = currentQuestionIndex + 1;
            $('questionTitle').textContent = question.title;
            $('questionText').textContent = question.text;
            var container = $('optionsContainer');
            container.innerHTML = '';
            for (var i = 0; i < question.options.length; i++) {
                (function(idx) {
                    var opt = question.options[idx];
                    var btn = document.createElement('button');
                    btn.className = 'btn btn-option';
                    var labelSpan = document.createElement('span');
                    labelSpan.className = 'option-label';
                    labelSpan.textContent = opt.label;
                    var textSpan = document.createElement('span');
                    textSpan.textContent = opt.text;
                    btn.appendChild(labelSpan);
                    btn.appendChild(textSpan);
                    btn.addEventListener('click', function() { selectOption(idx); });
                    container.appendChild(btn);
                })(i);
            }
        }

        function selectOption(optionIndex) {
            answers[currentQuestionIndex] = optionIndex === 0 ? 'A' : 'B';
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                var quizPage = $('quizPage');
                quizPage.style.animation = 'none';
                setTimeout(function() {
                    renderQuestion();
                    quizPage.style.animation = 'fadeIn 0.4s ease-out';
                }, 50);
            } else {
                showLoading();
            }
        }

        function showLoading() {
            showResult();
        }

        function showResult() {
            var resultCode = answers.join('');
            var result = results[resultCode];
            if (result) {
                $('resultName').textContent = result.name;
                $('resultCodeMini').textContent = resultCode;
                $('resultImage').src = result.image;
                $('resultImage').alt = result.name;
                $('resultDesc').innerHTML = '<p style="margin-bottom:16px;font-weight:500;color:var(--text-primary)">' + result.brief + '</p><p>' + result.detail + '</p>';
                $('resultQuestion').textContent = '【追问】' + result.question;
            }
            $('loadingPage').classList.remove('active');
            showPage('resultPage');
        }

        function showGallery() {
            var grid = $('galleryGrid');
            grid.innerHTML = '';
            var codes = ['AAAA', 'AAAB', 'AABA', 'AABB', 'ABAA', 'ABAB', 'ABBA', 'ABBB', 'BAAA', 'BAAB', 'BABA', 'BABB', 'BBAA', 'BBAB', 'BBBA', 'BBBB'];
            for (var i = 0; i < codes.length; i++) {
                (function(code) {
                    var r = results[code];
                    var card = document.createElement('div');
                    card.className = 'gallery-card';
                    card.innerHTML = '<img class="gallery-card-image" src="' + r.image + '" alt="' + r.name + '">' +
                        '<div class="gallery-card-info">' +
                        '<div class="gallery-card-name">' + r.name + '</div>' +
                        '<div class="gallery-card-code">' + code + '</div>' +
                        '<div class="gallery-card-brief">' + r.brief + '</div>' +
                        '</div>';
                    card.addEventListener('click', function() { showGalleryModal(code); });
                    grid.appendChild(card);
                })(codes[i]);
            }
            showPage('galleryPage');
        }

        function showGalleryModal(code) {
            var r = results[code];
            $('modalCode').textContent = code;
            $('modalName').textContent = r.name;
            $('modalImage').src = r.image;
            $('modalImage').alt = r.name;
            $('modalDesc').innerHTML = '<p style="margin-bottom:16px;font-weight:500;color:var(--text-primary)">' + r.brief + '</p><p>' + r.detail + '</p>';
            $('modalQuestion').textContent = '【追问】' + r.question;
            $('galleryModal').classList.add('active');
            document.body.classList.add('body-no-scroll');
        }

        function closeGalleryModal() {
            $('galleryModal').classList.remove('active');
            document.body.classList.remove('body-no-scroll');
        }

        function restartQuiz() {
            try {
                var url = new URL(window.location.href);
                url.searchParams.delete('result');
                window.history.replaceState({}, '', url);
            } catch(e) {}
            startQuiz();
        }

        function checkUrlParams() {
            try {
                var urlParams = new URLSearchParams(window.location.search);
                var resultCode = urlParams.get('result');
                if (resultCode && results[resultCode]) {
                    var result = results[resultCode];
                    $('resultName').textContent = result.name;
                    $('resultCodeMini').textContent = resultCode;
                    $('resultImage').src = result.image;
                    $('resultImage').alt = result.name;
                    $('resultDesc').innerHTML = '<p style="margin-bottom:16px;font-weight:500;color:var(--text-primary)">' + result.brief + '</p><p>' + result.detail + '</p>';
                    $('resultQuestion').textContent = '【追问】' + result.question;
                    showPage('resultPage');
                    return true;
                }
            } catch(e) {}
            return false;
        }

        function goHome() {
            try {
                var url = new URL(window.location.href);
                url.searchParams.delete('result');
                window.history.replaceState({}, '', url);
            } catch(e) {}
            showPage('homePage');
            $('backHomeBtn').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', function() {
            $('startBtn').addEventListener('click', startQuiz);
            $('restartBtn').addEventListener('click', restartQuiz);
            $('galleryBtn').addEventListener('click', showGallery);
            $('homeGalleryBtn').addEventListener('click', showGallery);
            $('modalClose').addEventListener('click', closeGalleryModal);
            $('galleryModal').addEventListener('click', function(e) {
                if (e.target === $('galleryModal')) { closeGalleryModal(); }
            });
            $('backHomeBtn').addEventListener('click', goHome);
            if (!checkUrlParams()) {
                showPage('homePage');
            }
        });
    })();
    </script>
</body>
</html>
